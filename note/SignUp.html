<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Suez In Your Hands - إنشاء حساب جديد</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@100;400;500;600;700&amp;family=Noto+Sans+Arabic:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Be Vietnam Pro', 'Noto Sans Arabic', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#930004",
                        "on-error": "#ffffff",
                        "tertiary-container": "#d9372b",
                        "inverse-primary": "#adc6ff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f2f3fd",
                        "on-tertiary-container": "#fffbff",
                        "surface": "#f9f9ff",
                        "on-background": "#191b22",
                        "on-error-container": "#93000a",
                        "surface-tint": "#005ac1",
                        "surface-container-high": "#e7e7f1",
                        "primary-fixed": "#d8e2ff",
                        "primary": "#0058bd",
                        "primary-container": "#2771df",
                        "inverse-surface": "#2e3038",
                        "outline": "#727785",
                        "on-secondary-fixed": "#002108",
                        "surface-bright": "#f9f9ff",
                        "surface-variant": "#e1e2eb",
                        "background": "#f9f9ff",
                        "surface-container-highest": "#e1e2eb",
                        "secondary": "#006e2c",
                        "on-surface-variant": "#424753",
                        "surface-container": "#ecedf7",
                        "on-tertiary-fixed": "#410001",
                        "secondary-fixed": "#89fa9b",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-primary": "#ffffff",
                        "tertiary": "#b51b15",
                        "secondary-fixed-dim": "#6ddd81",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#001a41",
                        "tertiary-fixed": "#ffdad5",
                        "on-secondary-container": "#00722f",
                        "tertiary-fixed-dim": "#ffb4a9",
                        "on-surface": "#191b22",
                        "primary-fixed-dim": "#adc6ff",
                        "surface-dim": "#d8d9e3",
                        "on-secondary-fixed-variant": "#005320",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#004494",
                        "outline-variant": "#c2c6d5",
                        "inverse-on-surface": "#eff0fa",
                        "on-primary-container": "#fefcff",
                        "secondary-container": "#86f898"
                    },
                    "borderRadius": {
                        "DEFAULT": "8px",
                        "lg": "8px",
                        "xl": "8px",
                        "2xl": "8px",
                        "3xl": "8px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-max": "1280px",
                        "margin-mobile": "16px",
                        "base": "8px",
                        "margin-desktop": "40px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "body-lg": ["Be Vietnam Pro"],
                        "headline-lg": ["Be Vietnam Pro"],
                        "headline-md": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "label-md": ["Be Vietnam Pro"],
                        "headline-xl": ["Be Vietnam Pro"],
                        "headline-xl-mobile": ["Be Vietnam Pro"],
                        "body-sm": ["Be Vietnam Pro"],
                        "headline-lg-mobile": ["Be Vietnam Pro"],
                        "label-sm": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-xl-mobile": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-start overflow-x-hidden">
<!-- Top AppBar Strategy (Task-Focused - No Nav) -->
<header class="fixed top-0 w-full z-50 bg-surface/80 glass-effect flex justify-between items-center h-20 px-margin-mobile md:px-margin-desktop">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl">storefront</span>
<h1 class="text-headline-md font-extrabold text-primary tracking-tight">Suez In Your Hands</h1>
</div>
<button class="p-2 rounded-full hover:bg-surface-variant/50 transition-colors active:scale-95" onclick="window.history.back()">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
</header>
<main class="w-full max-w-md mx-auto pt-24 pb-12 px-margin-mobile flex flex-col gap-8">
<!-- Hero Section -->
<section class="text-center flex flex-col items-center gap-4 animate-fade-in">
<div class="relative w-48 h-48 mb-2">
<div class="absolute inset-0 bg-primary/10 rounded-full scale-110 blur-xl"></div>
<div class="relative w-full h-full bg-surface-container rounded-3xl overflow-hidden shadow-sm border border-outline-variant/30">
</div>
<div class="absolute -bottom-2 -right-2 bg-secondary-container p-3 rounded-2xl shadow-lg border-2 border-surface-container-lowest">
</div>
</div>
<div class="flex flex-col gap-4">
<h1 class="text-headline-lg font-bold text-on-surface leading-tight">إنشاء حساب جديد</h1>
<p class="text-body-md text-on-surface-variant leading-relaxed px-4">
                    انضم إلى مجتمعنا التجاري - المنصة الأكثر أماناً للتجارة والخدمات المحلية في مدينة السويس.
                </p>
</div>
</section>
<!-- Form Container -->
<div class="bg-surface-container-lowest p-8 rounded-2xl shadow-[0px_4px_20px_rgba(0,0,0,0.04)] border border-outline-variant/20">
<form class="flex flex-col gap-6" onsubmit="return false;">
<!-- Phone Input -->
<div class="space-y-2">
<label class="text-label-md text-on-surface-variant block mr-1">رقم الهاتف المحمول</label>
<div class="flex flex-col gap-2">
<div class="flex flex-col gap-3">
<div class="relative group">
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex items-center gap-2 text-on-surface-variant group-focus-within:text-primary transition-colors border-l border-outline-variant/30 pl-3">
<span class="material-symbols-outlined text-[20px]">smartphone</span>
<span class="text-body-md font-bold">+2</span>
</div>
<input class="w-full pr-24 pl-4 py-4 bg-surface-container-lowest border border-outline-variant/30 rounded-xl text-body-md shadow-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" dir="ltr" placeholder="01XXXXXXXX" type="tel"/>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-on-primary py-4 rounded-xl text-label-md font-bold shadow-md active:scale-95 transition-all flex items-center justify-center gap-2" type="button">
<span>تحقق</span>
<span class="material-symbols-outlined text-[18px]">verified_user</span>
</button>
</div>
<p class="text-label-sm text-on-surface-variant flex items-center gap-1 mr-1">
<span class="material-symbols-outlined text-[14px]">info</span>
<span>سيتم إرسال رمز التحقق عبر رسالة نصية عبر الواتساب</span>
</p>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="text-label-md text-on-surface-variant block mr-1">كلمة المرور</label>
<div class="relative">
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">lock</span>
<input class="w-full pr-12 pl-12 py-4 bg-surface-container-lowest border border-outline-variant/30 rounded-xl text-body-md shadow-sm focus:ring-2 focus:ring-primary transition-all outline-none" id="pass" placeholder="••••••••" type="password"/>
<button class="absolute left-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary" onclick="togglePass('pass')" type="button">
<span class="material-symbols-outlined" id="pass-icon">visibility</span>
</button>
</div>
<!-- Password Strength Indicator -->
<div class="space-y-2 mt-2 px-1">
<div class="flex justify-between items-center mb-1">
<span class="text-label-sm text-on-surface-variant">قوة كلمة المرور:</span>
<span class="text-label-sm font-bold text-error" id="strength-text">ضعيفة جداً</span>
</div>
<div class="flex gap-2">
<div class="h-1.5 flex-1 rounded-full bg-error transition-all" id="strength-1"></div>
<div class="h-1.5 flex-1 rounded-full bg-surface-variant transition-all" id="strength-2"></div>
<div class="h-1.5 flex-1 rounded-full bg-surface-variant transition-all" id="strength-3"></div>
<div class="h-1.5 flex-1 rounded-full bg-surface-variant transition-all" id="strength-4"></div>
</div>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="text-label-md text-on-surface-variant block mr-1">تأكيد كلمة المرور</label>
<div class="relative">
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">lock_reset</span>
<input class="w-full pr-12 pl-12 py-4 bg-surface-container-lowest border border-outline-variant/30 rounded-xl text-body-md shadow-sm focus:ring-2 focus:ring-primary transition-all outline-none" id="confirm-pass" placeholder="••••••••" type="password"/>
<button class="absolute left-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary" onclick="togglePass('confirm-pass')" type="button">
<span class="material-symbols-outlined" id="confirm-pass-icon">visibility</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<label class="flex items-start gap-3 mt-2 cursor-pointer group">
<input class="mt-1 w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<span class="text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors">
                        أوافق على <a class="text-primary font-bold hover:underline" href="#">الشروط والأحكام</a> و <a class="text-primary font-bold hover:underline" href="#">سياسة الخصوصية</a>.
                    </span>
</label>
<!-- Primary Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-on-primary py-5 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-primary/20 active:scale-95 transition-all mt-4" type="submit">
<span class="text-headline-md font-bold">إنشاء الحساب الآن</span>
<span class="material-symbols-outlined">arrow_back</span>
</button>
</form>
</div>
<!-- Footer Link -->
<footer class="text-center mb-8">
<p class="text-body-md text-on-surface-variant">
                لديك حساب بالفعل؟ 
                <a class="text-primary font-bold hover:underline px-1" href="#">تسجيل الدخول</a>
</p>
</footer>
</main>
<!-- Visual Accents (Background blobs) -->
<div class="fixed top-20 -right-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-20 -left-20 w-80 h-80 bg-secondary-container/10 rounded-full blur-3xl -z-10"></div>
<script>
        function togglePass(id) {
            const input = document.getElementById(id);
            const icon = document.getElementById(id + '-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Mock Password Strength Logic
        document.getElementById('pass').addEventListener('input', (e) => {
            const val = e.target.value;
            const s1 = document.getElementById('strength-1');
            const s2 = document.getElementById('strength-2');
            const s3 = document.getElementById('strength-3');
            const s4 = document.getElementById('strength-4');
            const text = document.getElementById('strength-text');
            
            if (val.length === 0) {
                text.textContent = 'ضعيفة جداً';
                text.className = 'text-label-sm font-bold text-error';
                s1.className = 'h-1.5 flex-1 rounded-full bg-surface-variant';
                s2.className = 'h-1.5 flex-1 rounded-full bg-surface-variant';
                s3.className = 'h-1.5 flex-1 rounded-full bg-surface-variant';
                s4.className = 'h-1.5 flex-1 rounded-full bg-surface-variant';
                return;
            }

            if (val.length > 0) s1.className = 'h-1.5 flex-1 rounded-full bg-error';
            else s1.className = 'h-1.5 flex-1 rounded-full bg-surface-variant';
            
            if (val.length > 4) {
                s2.className = 'h-1.5 flex-1 rounded-full bg-tertiary-container';
                text.textContent = 'متوسطة';
                text.className = 'text-label-sm font-bold text-tertiary-container';
            } else s2.className = 'h-1.5 flex-1 rounded-full bg-surface-variant';
            
            if (val.length > 7) {
                s3.className = 'h-1.5 flex-1 rounded-full bg-secondary';
                text.textContent = 'قوية';
                text.className = 'text-label-sm font-bold text-secondary';
            } else s3.className = 'h-1.5 flex-1 rounded-full bg-surface-variant';
            
            if (val.length > 10) {
                s4.className = 'h-1.5 flex-1 rounded-full bg-secondary';
                text.textContent = 'قوية جداً';
            } else s4.className = 'h-1.5 flex-1 rounded-full bg-surface-variant';
        });
    </script>
</body></html>
